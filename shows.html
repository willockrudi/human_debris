  <style>
    .shows-list {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 0;
    }
    .show-card {
      display: flex;
      align-items: center;
      gap: 30px;
      background: var(--deep);
      border: 1px solid var(--dark-red);
      padding: 24px 30px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      transition: border-color 0.2s;
    }
    .show-card:hover {
      border-color: var(--blood);
    }
    .show-card.past {
      opacity: 0.5;
      border-color: var(--dim);
    }
    .show-card.past:hover { opacity: 0.7; }
    .show-date {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 70px;
    }
    .show-date .month {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 3px;
      color: var(--blood);
    }
    .show-date .day {
      font-family: 'Metal Mania', cursive;
      font-size: 2.5rem;
      line-height: 1;
      color: var(--off-white);
    }
    .show-date .year {
      font-family: 'Courier Prime', monospace;
      font-size: 0.75rem;
      color: var(--gray);
    }
    .show-info { flex: 1; min-width: 200px; }
    .show-info h3 {
      font-size: 1.1rem;
      margin-bottom: 4px;
    }
    .show-location, .show-time {
      font-family: 'Courier Prime', monospace;
      font-size: 0.85rem;
      color: var(--gray);
    }
    .past-badge {
      font-family: 'Courier Prime', monospace;
      font-size: 0.7rem;
      letter-spacing: 3px;
      color: var(--dim);
      border: 1px solid var(--dim);
      padding: 6px 14px;
    }
    .no-shows {
      font-family: 'Courier Prime', monospace;
      color: var(--gray);
      text-align: center;
      padding: 40px 0;
    }
    #shows-container {
      padding: 40px 0 80px;
    }
    #shows-container h2 {
      text-align: center;
      margin-bottom: 10px;
    }
    @media (max-width: 768px) {
      .show-card { padding: 20px; gap: 20px; }
    }
  </style>
</head>
