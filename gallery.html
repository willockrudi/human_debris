  <style>
    /* ── Gallery Grid ── */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 60px 0;
    }
    .gallery-img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border: 1px solid var(--dark-red);
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
    }
    .gallery-img:hover {
      transform: scale(1.02);
      border-color: var(--blood);
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 10000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.active { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 85vh;
      object-fit: contain;
    }
    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: none;
      border: none;
      color: var(--off-white);
      font-size: 2rem;
      cursor: pointer;
      padding: 20px;
      transition: color 0.2s;
      z-index: 10001;
    }
    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover { color: var(--blood); }
    .lightbox-close { top: 10px; right: 20px; font-size: 2.5rem; }
    .lightbox-prev  { left: 10px; top: 50%; transform: translateY(-50%); font-size: 3rem; }
    .lightbox-next  { right: 10px; top: 50%; transform: translateY(-50%); font-size: 3rem; }

    /* ── Video Section ── */
    .video-grid {
      padding: 40px 0 80px;
    }
    .video-grid h2 {
      text-align: center;
      margin-bottom: 30px;
    }
    .video-wrap {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border: 1px solid var(--dark-red);
      max-width: 800px;
      margin: 0 auto;
    }
    .video-wrap iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .gallery-placeholder {
      text-align: center;
      padding: 80px 20px;
      font-family: 'Courier Prime', monospace;
      color: var(--gray);
    }

    @media (max-width: 768px) {
      .gallery-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .gallery-img { height: 180px; }
    }
  </style>
</head>
